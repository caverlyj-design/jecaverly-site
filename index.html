:root{--bg:#0d1b2a;--bg-light:#1b2a3a;--card:#152232;--accent:#e8833a;--accent-light:#f0a060;--gold:#d4a843;--text:#e0e0e0;--text-dim:#9aa5b1;--white:#fff;--border:#2a3a4a}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.7;scroll-behavior:smooth}
.container{max-width:1100px;margin:0 auto;padding:0 24px}
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(13,27,42,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
nav .container{display:flex;justify-content:space-between;align-items:center;padding:16px 24px}
nav .brand{font-size:1.1rem;font-weight:700;color:var(--white);letter-spacing:.5px}
nav .brand span{color:var(--accent)}
nav ul{display:flex;gap:28px;list-style:none}
nav a{color:var(--text-dim);text-decoration:none;font-size:.9rem;transition:color .2s}
nav a:hover{color:var(--accent)}
@media(max-width:700px){nav ul{display:none}}
.hero{min-height:100vh;display:flex;align-items:center;background:linear-gradient(135deg,#0d1b2a,#152232);position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;top:0;right:0;width:50%;height:100%;background:radial-gradient(circle at 70% 50%,rgba(232,131,58,.08),transparent 60%)}
.hero .container{position:relative;z-index:1;padding-top:80px}
.hero-tag{display:inline-block;font-size:.8rem;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:16px;font-weight:600}
.hero h1{font-size:3rem;color:var(--white);margin-bottom:12px;line-height:1.2}
.hero .title{font-size:1.25rem;color:var(--text-dim);margin-bottom:8px}
.hero .creds{font-size:.95rem;color:var(--gold);margin-bottom:24px;font-weight:500}
.hero .bio{max-width:600px;font-size:1.05rem;color:var(--text);margin-bottom:32px}
.hero-btns{display:flex;gap:16px;flex-wrap:wrap}
.btn{display:inline-block;padding:12px 28px;border-radius:4px;text-decoration:none;font-size:.95rem;font-weight:600;transition:all .2s;border:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-light);transform:translateY(-1px)}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
